<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ユリーカ・ティロドス(Eureka Telodos)の公式ウェブサイト。黒と緑のツインテール吸血鬼VTuber。3Dアバター写真、Twitch実況、Unity解説動画など。">
    <title>Eureka Telodos Official Website | ユリーカティロドス 公式サイト</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vampire: {
                            black: '#0a050c',
                            dark: '#110a16',
                            card: '#1b1122',
                            green: '#39ff14',
                            emerald: '#00ffaa',
                            purple: '#8a2be2'
                        }
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(57, 255, 20, 0.35)',
                        'neon-strong': '0 0 25px rgba(57, 255, 20, 0.6)',
                        'gothic': '0 10px 30px rgba(0, 0, 0, 0.8)',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=UnifrakturMaguntia&family=Noto+Sans+JP:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #0a050c;
        }
        .font-cinzel {
            font-family: 'Cinzel', serif;
        }
        .font-gothic-gothic {
            font-family: 'UnifrakturMaguntia', cursive;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a050c;
        }
        ::-webkit-scrollbar-thumb {
            background: #1b1122;
            border-radius: 4px;
            border: 1px solid #39ff14;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #39ff14;
        }
        .gothic-border {
            border: 2px solid #1b1122;
            outline: 1px solid #39ff14;
            outline-offset: -4px;
        }
        .kv {
            position: relative;
            height: 50vh;
            width: 100%;
            overflow: hidden;
            background-color: #050206;
        }
        .kv-layer {
            position: absolute;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .kv-layer-bg {
            inset: -10%;
            z-index: 1;
            width: 120%;
            height: 120%;
        }
        .kv-layer-front {
            bottom: -3%;
            left: -3%;
            width: 106%;
            height: 106%;
            align-items: flex-end;
        }
        .kv-layer-02 { z-index: 3; }
        .kv-layer-01 { z-index: 4; }
        .kv-layer-effect { z-index: 5; }
        .kv-layer-04 { inset: 0; z-index: 6; }
        .kv-img-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .kv-img-fit {
            width: 100%;
            height: auto;
            display: block;
        }
        .kv-silhouette-img {
            filter: brightness(0) saturate(100%) invert(58%) sepia(93%) saturate(1519%) hue-rotate(81deg) brightness(109%) contrast(117%) blur(20px) opacity(0.5);
        }
        .kv-title-container {
            text-align: center;
            text-shadow: 0 0 10px rgba(10, 5, 12, 0.9), 0 0 30px rgba(57, 255, 20, 0.4);
            padding: 20px;
        }
    </style>
</head>
<body class="bg-vampire-black text-gray-300 antialiased">
    <!-- KV Section -->
    <section class="kv md:block flex items-center justify-center">
        <div class="kv-layer kv-layer-bg" id="kv-layer-bg">
            <img src="https://raw.githubusercontent.com/eureka-telodos/telodos-website/main/images/bg.png" class="kv-img-bg" alt="">
        </div>
        <div class="kv-layer kv-layer-front kv-layer-02" id="kv-layer-02">
            <img src="https://raw.githubusercontent.com/eureka-telodos/telodos-website/main/images/chara.png" class="kv-img-fit kv-silhouette-img" alt="">
        </div>
        <div class="kv-layer kv-layer-front kv-layer-01" id="kv-layer-01">
            <img src="https://raw.githubusercontent.com/eureka-telodos/telodos-website/main/images/chara.png" class="kv-img-fit" alt="ユリーカティロドス">
        </div>
        <div class="kv-layer kv-layer-front kv-layer-effect" id="kv-layer-effect">
            <img src="https://raw.githubusercontent.com/eureka-telodos/telodos-website/main/images/effect.png" class="kv-img-fit" style="mix-blend-mode: screen;" alt="">
        </div>
    </section>

    <script>
        const layers = [
            { id: 'kv-layer-bg', speed: 0.015, el: null },
            { id: 'kv-layer-02', speed: 0.04, el: null },
            { id: 'kv-layer-01', speed: 0.025, el: null },
            { id: 'kv-layer-effect', speed: 0.045, el: null }
        ];
        let targetX = 0, targetY = 0, currentX = 0, currentY = 0, isTicking = false;
        document.addEventListener('DOMContentLoaded', () => {
            layers.forEach(layer => layer.el = document.getElementById(layer.id));
        });
        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX - window.innerWidth / 2;
            targetY = e.clientY - window.innerHeight / 2;
            if (!isTicking) {
                window.requestAnimationFrame(updateParallax);
                isTicking = true;
            }
        });
        function updateParallax() {
            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;
            layers.forEach(layer => {
                if (layer.el) layer.el.style.transform = `translate3d(${currentX * layer.speed}px, ${currentY * layer.speed}px, 0px)`;
            });
            if (Math.abs(targetX - currentX) > 0.1 || Math.abs(targetY - currentY) > 0.1) window.requestAnimationFrame(updateParallax);
            else isTicking = false;
        }
    </script>
</body>
</html>
